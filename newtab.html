<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая вкладка</title>
  <style>
    :root {
      --nt-bg: #ffffff;
      --nt-text: #202124;
      --nt-text-secondary: #5f6368;
      --nt-accent: #1a73e8;
      --nt-input-bg: #f1f3f4;
      --nt-input-border: #dadce0;
      --nt-hover-bg: #dadce0;
      --nt-shadow: rgba(0,0,0,0.05);
      --nt-shadow-focus: rgba(26,115,232,0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--nt-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      color: var(--nt-text);
      transition: background 0.3s, color 0.3s;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      color: var(--nt-accent);
      margin-bottom: 8px;
      letter-spacing: -1px;
      transition: color 0.3s;
    }
    .logo span { color: #ea4335; }

    .subtitle {
      color: var(--nt-text-secondary);
      font-size: 16px;
      margin-bottom: 40px;
      transition: color 0.3s;
    }

    .search-container {
      width: 100%;
      max-width: 600px;
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--nt-input-bg);
      border-radius: 24px;
      padding: 4px 8px 4px 20px;
      border: 1px solid transparent;
      transition: all 0.2s;
      box-shadow: 0 1px 3px var(--nt-shadow);
    }
    .search-box:focus-within {
      background: var(--nt-bg);
      border-color: var(--nt-accent);
      box-shadow: 0 1px 6px var(--nt-shadow-focus);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 14px 0;
      font-size: 16px;
      color: var(--nt-text);
      min-width: 0;
    }
    .search-box input::placeholder {
      color: var(--nt-text-secondary);
    }

    .search-box button {
      background: var(--nt-accent);
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: filter 0.2s;
      white-space: nowrap;
      font-weight: 500;
    }
    .search-box button:hover { filter: brightness(0.9); }

    .search-icon {
      font-size: 20px;
      color: var(--nt-text-secondary);
      margin-right: 12px;
    }

    .quick-links {
      display: flex;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 12px;
      transition: background 0.2s;
      text-decoration: none;
      color: var(--nt-text);
      min-width: 70px;
    }
    .quick-link:hover { background: var(--nt-hover-bg); }
    .quick-link .icon { font-size: 32px; }
    .quick-link .name {
      font-size: 12px;
      color: var(--nt-text-secondary);
    }

    .footer {
      margin-top: 50px;
      color: var(--nt-text-secondary);
      font-size: 13px;
    }

    #suggest-container {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--nt-bg);
      border: 1px solid var(--nt-input-border);
      border-radius: 0 0 16px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      max-height: 350px;
      overflow-y: auto;
      z-index: 9999;
      display: none;
      padding: 4px 0;
    }

    #suggest-container .suggest-item {
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--nt-text);
      transition: background 0.12s;
      font-size: 14px;
      min-height: 38px;
    }
    #suggest-container .suggest-item:hover,
    #suggest-container .suggest-item.active {
      background: var(--nt-hover-bg);
    }
    #suggest-container .suggest-item .icon {
      font-size: 16px;
      color: var(--nt-text-secondary);
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }
    #suggest-container .suggest-item .text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #suggest-container .suggest-item .text strong {
      font-weight: 600;
      color: var(--nt-accent);
    }
    #suggest-container .suggest-item .hint {
      font-size: 11px;
      color: var(--nt-text-secondary);
      flex-shrink: 0;
      padding: 2px 10px;
      background: var(--nt-hover-bg);
      border-radius: 10px;
    }

    #suggest-container::-webkit-scrollbar {
      width: 4px;
    }
    #suggest-container::-webkit-scrollbar-thumb {
      background: var(--nt-input-border);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="logo">Alpha<span>Z</span></div>
  <div class="subtitle">Быстрый и безопасный браузер</div>

  <div class="search-container">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Поиск в интернете" autofocus />
      <button id="search-btn">Найти</button>
    </div>
    <div id="suggest-container"></div>
  </div>

  <div class="quick-links">
    <a class="quick-link" href="#" data-url="https://ya.ru">
      <span class="icon">🌀</span>
      <span class="name">Яндекс</span>
    </a>
    <a class="quick-link" href="#" data-url="https://www.google.com">
      <span class="icon">🔵</span>
      <span class="name">Google</span>
    </a>
    <a class="quick-link" href="#" data-url="https://github.com">
      <span class="icon">🐙</span>
      <span class="name">GitHub</span>
    </a>
    <a class="quick-link" href="#" data-url="https://www.youtube.com">
      <span class="icon">▶️</span>
      <span class="name">YouTube</span>
    </a>
  </div>

  <div class="footer">AlphaZ Browser © 2024</div>

  <script>
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const suggestContainer = document.getElementById('suggest-container');
    const quickLinks = document.querySelectorAll('.quick-link');

    let suggestTimeout = null;

    // ============================================================
    //  ПОЛУЧАЕМ ПОИСКОВИК ЧЕРЕЗ IPC (ЕДИНЫЙ ИСТОЧНИК)
    // ============================================================
    let currentSearchEngine = 'yandex';
    
    async function loadSearchEngine() {
      try {
        const engine = await window.electronAPI.getSearchEngine();
        currentSearchEngine = engine || 'yandex';
        console.log(`🔍 Поисковик загружен: ${currentSearchEngine}`);
      } catch (e) {
        console.warn('Ошибка загрузки поисковика:', e);
        currentSearchEngine = 'yandex';
      }
    }

    function getSearchEngine() {
      const engines = {
        yandex: { name: 'Яндекс', searchUrl: 'https://yandex.ru/search/?text=' },
        google: { name: 'Google', searchUrl: 'https://www.google.com/search?q=' },
        duckduckgo: { name: 'DuckDuckGo', searchUrl: 'https://duckduckgo.com/?q=' },
        bing: { name: 'Bing', searchUrl: 'https://www.bing.com/search?q=' }
      };
      return engines[currentSearchEngine] || engines.yandex;
    }

    // Слушаем изменения настроек
    if (window.electronAPI && window.electronAPI.onSettingsChanged) {
      window.electronAPI.onSettingsChanged((settings) => {
        if (settings && settings.searchEngine) {
          currentSearchEngine = settings.searchEngine;
          console.log(`🔍 Поисковик обновлён: ${currentSearchEngine}`);
        }
      });
    }

    // ============================================================
    //  ПРИМЕНЕНИЕ ТЕМЫ ЧЕРЕЗ IPC
    // ============================================================
    async function applyThemeFromMain() {
      try {
        const settings = await window.electronAPI.getSettings();
        const theme = settings.theme || 'light';
        const customTheme = settings.customTheme || null;

        if (theme === 'custom' && customTheme) {
          const root = document.documentElement;
          root.style.setProperty('--nt-bg', customTheme.toolbar || '#f1f3f4');
          root.style.setProperty('--nt-text', '#202124');
          root.style.setProperty('--nt-text-secondary', '#5f6368');
          root.style.setProperty('--nt-accent', customTheme.accent || '#1a73e8');
          root.style.setProperty('--nt-input-bg', customTheme.tab || '#e8eaed');
          root.style.setProperty('--nt-input-border', '#dadce0');
          root.style.setProperty('--nt-hover-bg', customTheme.tabHover || '#dadce0');
          return;
        }

        const themes = {
          'light': {
            bg: '#ffffff',
            text: '#202124',
            textSecondary: '#5f6368',
            accent: '#1a73e8',
            inputBg: '#f1f3f4',
            inputBorder: '#dadce0',
            hoverBg: '#dadce0',
          },
          'dark-classic': {
            bg: '#2d2d2d',
            text: '#e0e0e0',
            textSecondary: '#b0b0b0',
            accent: '#666',
            inputBg: '#3d3d3d',
            inputBorder: '#555',
            hoverBg: '#4a4a4a',
          },
          'dark-modern': {
            bg: '#1e1e2e',
            text: '#cdd6f4',
            textSecondary: '#a6adc8',
            accent: '#89b4fa',
            inputBg: '#313156',
            inputBorder: '#45457a',
            hoverBg: '#35355a',
          },
        };

        const t = themes[theme] || themes.light;
        const root = document.documentElement;
        root.style.setProperty('--nt-bg', t.bg);
        root.style.setProperty('--nt-text', t.text);
        root.style.setProperty('--nt-text-secondary', t.textSecondary);
        root.style.setProperty('--nt-accent', t.accent);
        root.style.setProperty('--nt-input-bg', t.inputBg);
        root.style.setProperty('--nt-input-border', t.inputBorder);
        root.style.setProperty('--nt-hover-bg', t.hoverBg);

      } catch (error) {
        console.warn('Ошибка применения темы:', error);
      }
    }

    // ============================================================
    //  ПОДСКАЗКИ
    // ============================================================
    async function fetchSuggestions(query) {
      if (!query || query.length < 1) {
        suggestContainer.style.display = 'none';
        return;
      }

      try {
        const url = `https://suggest.yandex.ru/suggest-ff.cgi?part=${encodeURIComponent(query)}&v=4&sn=5&srv=ru&uil=ru`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data && data[1] && data[1].length > 0) {
          renderSuggestions(data[1], query);
          suggestContainer.style.display = 'block';
        } else {
          renderSuggestions([], query);
          suggestContainer.style.display = 'block';
        }
      } catch (error) {
        renderSuggestions([], query);
        suggestContainer.style.display = 'block';
      }
    }

    function renderSuggestions(suggestions, query) {
      suggestContainer.innerHTML = '';
      
      const searchItem = document.createElement('div');
      searchItem.className = 'suggest-item';
      searchItem.innerHTML = `
        <span class="icon">🔍</span>
        <span class="text"><strong>${escapeHtml(query)}</strong></span>
        <span class="hint">поиск</span>
      `;
      searchItem.addEventListener('click', () => {
        performSearch(query);
      });
      suggestContainer.appendChild(searchItem);

      suggestions.slice(0, 8).forEach((suggestion) => {
        const item = document.createElement('div');
        item.className = 'suggest-item';
        
        let displayText = escapeHtml(suggestion);
        const lowerQuery = query.toLowerCase();
        const lowerSuggestion = suggestion.toLowerCase();
        const index = lowerSuggestion.indexOf(lowerQuery);
        
        if (index !== -1 && query.length > 0) {
          const before = escapeHtml(suggestion.substring(0, index));
          const match = escapeHtml(suggestion.substring(index, index + query.length));
          const after = escapeHtml(suggestion.substring(index + query.length));
          displayText = `${before}<strong>${match}</strong>${after}`;
        }
        
        item.innerHTML = `
          <span class="icon">💡</span>
          <span class="text">${displayText}</span>
        `;
        item.addEventListener('click', () => {
          performSearch(suggestion);
        });
        suggestContainer.appendChild(item);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================================
    //  ПОИСК (использует выбранный поисковик)
    // ============================================================
    function performSearch(query) {
      const engine = getSearchEngine();
      window.location.href = `${engine.searchUrl}${encodeURIComponent(query)}`;
    }

    // ============================================================
    //  СОБЫТИЯ
    // ============================================================
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim();
      clearTimeout(suggestTimeout);
      suggestTimeout = setTimeout(() => {
        fetchSuggestions(query);
      }, 200);
    });

    searchInput.addEventListener('focus', () => {
      const val = searchInput.value.trim();
      if (val.length >= 1) {
        fetchSuggestions(val);
      }
    });

    searchInput.addEventListener('blur', () => {
      setTimeout(() => {
        suggestContainer.style.display = 'none';
      }, 250);
    });

    searchInput.addEventListener('keydown', (e) => {
      const items = suggestContainer.querySelectorAll('.suggest-item');
      let activeIndex = -1;
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        items.forEach((item, index) => {
          if (item.classList.contains('active')) {
            activeIndex = index;
            item.classList.remove('active');
          }
        });
        const nextIndex = activeIndex + 1 >= items.length ? 0 : activeIndex + 1;
        if (items[nextIndex]) {
          items[nextIndex].classList.add('active');
          items[nextIndex].scrollIntoView({ block: 'nearest' });
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        items.forEach((item, index) => {
          if (item.classList.contains('active')) {
            activeIndex = index;
            item.classList.remove('active');
          }
        });
        const prevIndex = activeIndex - 1 < 0 ? items.length - 1 : activeIndex - 1;
        if (items[prevIndex]) {
          items[prevIndex].classList.add('active');
          items[prevIndex].scrollIntoView({ block: 'nearest' });
        }
      } else if (e.key === 'Enter') {
        const activeItem = suggestContainer.querySelector('.suggest-item.active');
        if (activeItem) {
          e.preventDefault();
          activeItem.click();
        } else {
          suggestContainer.style.display = 'none';
          searchBtn.click();
        }
      } else if (e.key === 'Escape') {
        suggestContainer.style.display = 'none';
      }
    });

    searchBtn.addEventListener('click', () => {
      const query = searchInput.value.trim();
      if (query) {
        performSearch(query);
      }
    });

    quickLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const url = link.dataset.url;
        window.location.href = url;
      });
    });

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    async function init() {
      await loadSearchEngine();
      await applyThemeFromMain();
      searchInput.focus();
    }

    // Слушаем изменения настроек (тема)
    if (window.electronAPI && window.electronAPI.onSettingsChanged) {
      window.electronAPI.onSettingsChanged((settings) => {
        applyThemeFromMain();
      });
    }

    init();
  </script>
</body>
</html>
